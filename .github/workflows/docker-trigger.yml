name: Docker Build Trigger

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Microservice name"
        required: true
        default: "admin-service"
      tag:
        description: "Image tag"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.inputs.service }}:${{ github.event.inputs.tag }} .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.inputs.service }}:${{ github.event.inputs.tag }}