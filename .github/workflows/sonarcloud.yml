name: CI Pipeline (SonarQube → Snyk → Docker)

on:
  push:
    branches:
      - ci-pipeline
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter Docker Image Tag (e.g., v1.0.0)"
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      # ✅ SonarQube Scan (FIXED)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=admin-service
            -Dsonar.sources=.

      # ✅ Optional but recommended
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ✅ Snyk
      - name: Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

      # ✅ Docker Build
      - name: Build Docker Image
        run: docker build -t suwetha07/app:temp .

      # ✅ Dynamic Tag
      - name: Set Image Tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG=${{ github.event.inputs.image_tag }}
          else
            TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Tag Image
        run: docker tag suwetha07/app:temp suwetha07/app:$IMAGE_TAG

      # ✅ Snyk Container Scan
      - name: Snyk Container Scan
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk container test suwetha07/app:$IMAGE_TAG

      # ✅ Docker Login
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ Push
      - name: Push Docker Image
        run: docker push suwetha07/app:$IMAGE_TAG