name: Secure CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# =========================
# 1. SONARCLOUD SCAN
# =========================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=admin-service
            -Dsonar.organization=your-org-name
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

# =========================
# 2. SNYK SCAN
# =========================
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Test
        run: snyk test --severity-threshold=high

# =========================
# 3. BUILD DOCKER IMAGE
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: snyk

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest .

# =========================
# 4. TRIVY SCAN
# =========================
  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest
          exit-code: 1
          severity: HIGH,CRITICAL

# =========================
# 5. PUSH IMAGE
# =========================
  push:
    name: Push Image
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest

# =========================
# 6. NOTIFICATION
# =========================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Success Message
        run: echo "Pipeline completed successfully"


      - name: SonarCloud Scan
  uses: SonarSource/sonarqube-scan-action@v6
  env:
    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  with:
    args: >
      -Dsonar.projectKey=admin-service
      -Dsonar.organization=team4devops
      -Dsonar.sources=.
      -Dsonar.host.url=https://sonarcloud.io    