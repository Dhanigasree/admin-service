name: Admin Service CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install Dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run Tests (Safe)
      - name: Run tests
        run: npm test --if-present

      # 5. Build
      - name: Build project
        run: npm run build --if-present

      # 6. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=admin-service
            -Dsonar.organization=YOUR_ORG
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 7. Snyk Scan
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 8. Slack Success (runs only if previous steps passed)
      - name: Slack Notification Success
        if: success()
        uses: 8398a7/action-slack@v3
        continue-on-error: true   # prevents failure if webhook not set
        with:
          status: success
          text: "✅ Admin Service Build Passed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      # 9. Slack Failure
      - name: Slack Notification Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: failure
          text: "❌ Admin Service Build Failed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}