name: Microservice Secure CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

# =========================
# 1. CODE QUALITY - SONARCLOUD
# =========================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

# =========================
# 2. SCA SCAN - SNYK
# =========================
  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Test (Fail on HIGH/CRITICAL)
        run: snyk test --severity-threshold=high

# =========================
# 3. BUILD DOCKER IMAGE
# =========================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: snyk-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest .

# =========================
# 4. CONTAINER SECURITY SCAN - TRIVY
# =========================
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Run Trivy Scan (Fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

# =========================
# 5. PUSH IMAGE TO DOCKER HUB
# =========================
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/admin-service:latest

# =========================
# 6. NOTIFICATION (SUCCESS ONLY)
# =========================
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Success Notification
        run: |
          curl -X POST -H "Content-Type: application/json" \
          --data '{"text":"✅ Admin Service CI Pipeline SUCCESS: Image built, scanned, and pushed successfully."}' \
          ${{ secrets.SLACK_WEBHOOK }}